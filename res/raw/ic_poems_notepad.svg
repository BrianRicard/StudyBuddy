<svg xmlns="http://www.w3.org/2000/svg" width="48" height="48" viewBox="0 0 48 48" fill="none">
  <defs>
    <linearGradient id="pad_grad" x1="10" y1="4" x2="38" y2="44" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#FFF9C4"/>
      <stop offset="1" stop-color="#FFF176"/>
    </linearGradient>
    <linearGradient id="pencil_grad" x1="30" y1="4" x2="42" y2="20" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#FF7043"/>
      <stop offset="1" stop-color="#E64A19"/>
    </linearGradient>
  </defs>
  <!-- Notepad page -->
  <rect x="6" y="6" width="28" height="36" rx="3" fill="url(#pad_grad)"/>
  <!-- Page shadow edge -->
  <rect x="6" y="6" width="28" height="36" rx="3" stroke="#E0C74D" stroke-width="1" fill="none"/>
  <!-- Ruled lines -->
  <line x1="10" y1="16" x2="30" y2="16" stroke="#D4C05E" stroke-width="0.8" opacity="0.5"/>
  <line x1="10" y1="22" x2="30" y2="22" stroke="#D4C05E" stroke-width="0.8" opacity="0.5"/>
  <line x1="10" y1="28" x2="30" y2="28" stroke="#D4C05E" stroke-width="0.8" opacity="0.5"/>
  <line x1="10" y1="34" x2="26" y2="34" stroke="#D4C05E" stroke-width="0.8" opacity="0.5"/>
  <!-- Writing scribble -->
  <path d="M11 16C14 15.5 18 16 22 15.5" stroke="#78909C" stroke-width="1" stroke-linecap="round" opacity="0.5" fill="none"/>
  <path d="M11 22C16 21.5 20 22 28 21.5" stroke="#78909C" stroke-width="1" stroke-linecap="round" opacity="0.5" fill="none"/>
  <path d="M11 28C15 27.5 19 28 25 27.5" stroke="#78909C" stroke-width="1" stroke-linecap="round" opacity="0.5" fill="none"/>
  <!-- Pencil -->
  <g transform="rotate(-45 38 10)">
    <rect x="34" y="4" width="6" height="28" rx="1" fill="url(#pencil_grad)"/>
    <!-- Pencil wood/tip -->
    <path d="M34 32L37 38L40 32Z" fill="#FFE0B2"/>
    <path d="M36 34L37 38L38 34Z" fill="#455A64"/>
    <!-- Pencil band -->
    <rect x="34" y="28" width="6" height="3" fill="#FFC107"/>
    <!-- Eraser -->
    <rect x="34" y="4" width="6" height="4" rx="1" fill="#F48FB1"/>
    <!-- Pencil highlight -->
    <line x1="35.5" y1="8" x2="35.5" y2="26" stroke="white" stroke-width="0.8" opacity="0.25"/>
  </g>
</svg>
