  <line x1="11" y1="26" x2="13.5" y2="26" stroke="white" stroke-width="1.5" stroke-linecap="round" opacity="0.8"/>
  <line x1="34.5" y1="26" x2="37" y2="26" stroke="white" stroke-width="1.5" stroke-linecap="round" opacity="0.8"/>
