name: Release

on:
  push:
    tags:
      - 'v*'

env:
  JAVA_VERSION: '17'
  JAVA_DISTRIBUTION: 'temurin'
  GRADLE_OPTS: '-Dorg.gradle.daemon=false -Dorg.gradle.parallel=true -Dorg.gradle.caching=true'

jobs:
  release-build:
    name: Build Release APK & AAB
    runs-on: ubuntu-latest
    timeout-minutes: 45
    # Signing secrets (KEYSTORE_BASE64, KEYSTORE_PASSWORD, KEY_ALIAS,
    # KEY_PASSWORD) live in this environment, not at repo level. Without
    # this declaration, the job sees them as empty and silently signs
    # releases with an ephemeral keystore, producing APKs that cannot be
    # installed as upgrades over previous releases.
    environment: GITHUB_CRASH_TOKEN
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: ${{ env.JAVA_DISTRIBUTION }}

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Extract version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT

      - name: Create release keystore
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: |
          set -euo pipefail

          # Fail fast if any required signing secret is missing. Without these,
          # the workflow used to silently generate an ephemeral keystore on every
          # run, producing APKs that could not be installed as upgrades over
          # previous releases ("App Not Installed" / INSTALL_FAILED_UPDATE_INCOMPATIBLE).
          missing=()
          [ -z "${KEYSTORE_BASE64:-}" ] && missing+=("KEYSTORE_BASE64")
          [ -z "${KEYSTORE_PASSWORD:-}" ] && missing+=("KEYSTORE_PASSWORD")
          [ -z "${KEY_ALIAS:-}" ] && missing+=("KEY_ALIAS")
          [ -z "${KEY_PASSWORD:-}" ] && missing+=("KEY_PASSWORD")
          if [ ${#missing[@]} -gt 0 ]; then
            echo "::error::Missing required signing secrets: ${missing[*]}"
            echo "::error::These must be set on the 'GITHUB_CRASH_TOKEN' environment in repository settings."
            echo "::error::Repository-level secrets will NOT be visible to this job."
            exit 1
          fi

          STORE_PASS="$KEYSTORE_PASSWORD"

          echo "$KEYSTORE_BASE64" | base64 -d > app/release-src.keystore
          echo "Decoded keystore size: $(wc -c < app/release-src.keystore) bytes"

          converted=false
          # Try PKCS12 -> JKS conversion first (most common)
          if keytool -importkeystore \
               -srckeystore app/release-src.keystore -srcstorepass "$STORE_PASS" -srcstoretype PKCS12 \
               -destkeystore app/release.keystore -deststoretype JKS \
               -deststorepass "$STORE_PASS" -noprompt 2>&1; then
            echo "Converted PKCS12 keystore to JKS"
            converted=true
          # Try JKS -> JKS (already JKS, just copy)
          elif keytool -list -keystore app/release-src.keystore -storepass "$STORE_PASS" -storetype JKS >/dev/null 2>&1; then
            echo "Keystore is already JKS, using directly"
            cp app/release-src.keystore app/release.keystore
            converted=true
          # Try auto-detect source type
          elif keytool -importkeystore \
               -srckeystore app/release-src.keystore -srcstorepass "$STORE_PASS" \
               -destkeystore app/release.keystore -deststoretype JKS \
               -deststorepass "$STORE_PASS" -noprompt 2>&1; then
            echo "Converted keystore to JKS (auto-detected source type)"
            converted=true
          fi
          rm -f app/release-src.keystore

          if [ "$converted" != "true" ]; then
            echo "::error::Failed to load KEYSTORE_BASE64 as PKCS12 or JKS. Check the secret value and KEYSTORE_PASSWORD."
            exit 1
          fi

          # Print the cert SHA-256 fingerprint so any future cert change is
          # immediately visible in the build log. A drift here means upgrades
          # will break for installed users.
          echo "::group::Release signing certificate fingerprint"
          keytool -list -v -keystore app/release.keystore -storepass "$STORE_PASS" -alias "$KEY_ALIAS" \
            | grep -E "SHA256:|Owner:|Valid from:" || true
          echo "::endgroup::"

      - name: Build Release APK
        env:
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: |
          export KEYSTORE_PASSWORD="${KEYSTORE_PASSWORD:-android}"
          export KEY_ALIAS="${KEY_ALIAS:-release}"
          export KEY_PASSWORD="${KEY_PASSWORD:-android}"
          ./gradlew assembleRelease

      - name: Build Release AAB
        env:
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: |
          export KEYSTORE_PASSWORD="${KEYSTORE_PASSWORD:-android}"
          export KEY_ALIAS="${KEY_ALIAS:-release}"
          export KEY_PASSWORD="${KEY_PASSWORD:-android}"
          ./gradlew bundleRelease

      - name: Run Release Unit Tests
        continue-on-error: true
        env:
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: |
          export KEYSTORE_PASSWORD="${KEYSTORE_PASSWORD:-android}"
          export KEY_ALIAS="${KEY_ALIAS:-release}"
          export KEY_PASSWORD="${KEY_PASSWORD:-android}"
          timeout --kill-after=30 900 ./gradlew testReleaseUnitTest --continue

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "StudyBuddy v${{ steps.version.outputs.VERSION }}"
          generate_release_notes: true
          files: |
            app/build/outputs/apk/release/app-release.apk
            app/build/outputs/bundle/release/app-release.aab

      - name: Upload to Play Store (internal track)
        if: false
        uses: r0adkll/upload-google-play@v1
        with:
          serviceAccountJsonPlainText: ${{ secrets.PLAY_SERVICE_ACCOUNT }}
          packageName: com.studybuddy.app
          releaseFiles: app/build/outputs/bundle/release/app-release.aab
          track: internal
