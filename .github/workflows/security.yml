name: Security Scanning

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  schedule:
    - cron: '0 6 * * 1'
  workflow_dispatch:

concurrency:
  group: security-${{ github.ref }}
  cancel-in-progress: true

env:
  JAVA_VERSION: '17'
  JAVA_DISTRIBUTION: 'temurin'
  GRADLE_OPTS: '-Dorg.gradle.daemon=false -Dorg.gradle.parallel=true -Dorg.gradle.caching=true'

jobs:
  secret-scanning:
    name: Secret Scanning (Gitleaks)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run Gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  dependency-vulnerability-scan:
    name: Dependency Vulnerability Scan (OWASP)
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: ${{ env.JAVA_DISTRIBUTION }}

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          cache-read-only: true

      - name: Run OWASP Dependency-Check
        run: ./gradlew dependencyCheckAnalyze --continue
        env:
          NVD_API_KEY: ${{ secrets.NVD_API_KEY }}

      - name: Upload OWASP Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: owasp-dependency-check-report
          path: |
            build/reports/dependency-check-report.html
            build/reports/dependency-check-report.json
          retention-days: 30

      - name: Upload SARIF to GitHub Security
        if: always() && hashFiles('build/reports/dependency-check-report.sarif') != ''
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: build/reports/dependency-check-report.sarif
          category: owasp-dependency-check
        continue-on-error: true

  license-compliance:
    name: License Compliance Check
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: ${{ env.JAVA_DISTRIBUTION }}

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          cache-read-only: true

      - name: Check License Compliance
        run: ./gradlew :app:licensee

      - name: Upload License Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: license-report
          path: app/build/reports/licensee/
          retention-days: 30

  security-lint:
    name: Android Security Lint
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: ${{ env.JAVA_DISTRIBUTION }}

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          cache-read-only: true

      - name: Run Security-Focused Lint
        run: ./gradlew lintDebug --continue

      - name: Upload SARIF Lint Report
        if: always() && hashFiles('app/build/reports/lint-results-debug.sarif') != ''
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: app/build/reports/lint-results-debug.sarif
          category: android-lint
        continue-on-error: true

      - name: Upload Lint Reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: security-lint-reports
          path: |
            **/build/reports/lint-results-*.html
            **/build/reports/lint-results-*.sarif
          retention-days: 30

  apk-analysis:
    name: APK Size & Binary Analysis
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: ${{ env.JAVA_DISTRIBUTION }}

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          cache-read-only: true

      - name: Build Debug APK
        run: ./gradlew assembleDebug -x validateSigningDebug

      - name: Analyze APK Size
        run: |
          APK_PATH="app/build/outputs/apk/debug/app-debug.apk"
          if [ -f "$APK_PATH" ]; then
            APK_SIZE=$(stat -c%s "$APK_PATH")
            APK_SIZE_MB=$(echo "scale=2; $APK_SIZE / 1048576" | bc)
            echo "## APK Size Report" >> "$GITHUB_STEP_SUMMARY"
            echo "" >> "$GITHUB_STEP_SUMMARY"
            echo "| Metric | Value |" >> "$GITHUB_STEP_SUMMARY"
            echo "|--------|-------|" >> "$GITHUB_STEP_SUMMARY"
            echo "| Debug APK Size | ${APK_SIZE_MB} MB |" >> "$GITHUB_STEP_SUMMARY"
            echo "| Debug APK Size (bytes) | ${APK_SIZE} |" >> "$GITHUB_STEP_SUMMARY"

            # Size threshold: warn if over 50MB for a kid's app
            MAX_SIZE=$((50 * 1048576))
            if [ "$APK_SIZE" -gt "$MAX_SIZE" ]; then
              echo "" >> "$GITHUB_STEP_SUMMARY"
              echo "> **Warning:** APK exceeds 50 MB threshold" >> "$GITHUB_STEP_SUMMARY"
              echo "::warning::Debug APK size (${APK_SIZE_MB} MB) exceeds 50 MB threshold"
            fi

            echo "APK_SIZE_MB=${APK_SIZE_MB}" >> "$GITHUB_ENV"
          else
            echo "::warning::APK not found at $APK_PATH"
          fi

      - name: Check for Hardcoded Secrets in APK
        run: |
          APK_PATH="app/build/outputs/apk/debug/app-debug.apk"
          if [ -f "$APK_PATH" ]; then
            mkdir -p /tmp/apk-analysis
            cp "$APK_PATH" /tmp/apk-analysis/app.zip
            cd /tmp/apk-analysis
            unzip -q app.zip -d extracted || true

            echo "## Binary Secret Scan" >> "$GITHUB_STEP_SUMMARY"
            echo "" >> "$GITHUB_STEP_SUMMARY"

            # Check for common secret patterns in DEX files
            FINDINGS=0
            for pattern in "AKIA[0-9A-Z]{16}" "AIza[0-9A-Za-z_-]{35}" "-----BEGIN.*PRIVATE KEY-----" "sk_live_[0-9a-zA-Z]{24}"; do
              if grep -rlP "$pattern" extracted/ 2>/dev/null; then
                echo "::error::Potential secret found matching pattern: $pattern"
                FINDINGS=$((FINDINGS + 1))
              fi
            done

            if [ "$FINDINGS" -eq 0 ]; then
              echo "No hardcoded secrets detected in APK binary." >> "$GITHUB_STEP_SUMMARY"
            else
              echo "**${FINDINGS} potential secret(s) detected in APK binary!**" >> "$GITHUB_STEP_SUMMARY"
              exit 1
            fi
          fi

  detekt-security:
    name: Detekt Security Rules
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: ${{ env.JAVA_DISTRIBUTION }}

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          cache-read-only: true

      - name: Run Detekt with Security Focus
        run: ./gradlew detekt --continue

      - name: Upload Detekt SARIF
        if: always() && hashFiles('build/reports/detekt/*.sarif') != ''
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: build/reports/detekt/
          category: detekt
        continue-on-error: true

  security-summary:
    name: Security Summary
    runs-on: ubuntu-latest
    timeout-minutes: 5
    needs:
      - secret-scanning
      - dependency-vulnerability-scan
      - license-compliance
      - security-lint
      - apk-analysis
      - detekt-security
    if: always()
    steps:
      - name: Generate Security Summary
        run: |
          echo "## Security Scan Summary" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "| Check | Status |" >> "$GITHUB_STEP_SUMMARY"
          echo "|-------|--------|" >> "$GITHUB_STEP_SUMMARY"
          echo "| Secret Scanning (Gitleaks) | ${{ needs.secret-scanning.result }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Dependency Vulnerabilities (OWASP) | ${{ needs.dependency-vulnerability-scan.result }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| License Compliance | ${{ needs.license-compliance.result }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Android Security Lint | ${{ needs.security-lint.result }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| APK Binary Analysis | ${{ needs.apk-analysis.result }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Detekt Security Rules | ${{ needs.detekt-security.result }} |" >> "$GITHUB_STEP_SUMMARY"

      - name: Check for failures
        if: |
          needs.secret-scanning.result == 'failure' ||
          needs.license-compliance.result == 'failure' ||
          needs.security-lint.result == 'failure' ||
          needs.apk-analysis.result == 'failure'
        run: |
          echo "::error::One or more security checks failed. Review the summary above."
          exit 1
